<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Login Page</h1>
    <div class="d1">

        <label for="username">
            enter username:

         <label for="password">
            enter password:
         <input type = "password" id="password" placeholder="enter password">
         <br>
         </label>
         <button id="bu1"> submit</button>
         <br>
    </form>
    </div>
    <form action="https://www.youtube.com/results">
        <input type="text" placeholder="search in youtube" name="search_query">
        <button type="submit">search</button>

    <br><hr>
    <form action="https://www.google.com/search">

    </form>
    <form action="/server">
    <input type="checkbox" name="age" id="age" checked>
    <label for="age">i am 18+</label>
    <div>
    <input type="radio" name="fruit" id="apple" value="apple">
    <label for="apple">apple</label>

    </div>
    <div>
        choose your profession

            <option value="dev">devoloper</option>

    </div>
    <div>
        year of experience
